# ═══════════════════════════════════════════════════════════════
# IQPrep Backend — application.properties  (COMPLETE FILE)
# ═══════════════════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── Database ────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/iqprep_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:pass123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── App ─────────────────────────────────────────────────────────
spring.application.name=iqprep-backend

# ── CORS — allow all local dev origins ──────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501

# ── Groq AI ─────────────────────────────────────────────────────
# Both property names so GroqProperties and any legacy refs work
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
gemini.api.key=${groq.api.key}
gemini.api.url=${groq.api.url}

# ── File Upload ──────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ════════════════════════════════════════════════════════════════
#  EMAIL / OTP  ──  Gmail SMTP
# ════════════════════════════════════════════════════════════════
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ════════════════════════════════════════════════════════════════
#  GOOGLE OAUTH2
# ════════════════════════════════════════════════════════════════
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://127.0.0.1:3000/IQPrep-Deploy/frontend/pages/oauth-callback.html}

# ════════════════════════════════════════════════════════════════
#  GITHUB OAUTH2
# ════════════════════════════════════════════════════════════════
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
github.redirect.uri=${GITHUB_REDIRECT_URI:http://127.0.0.1:3000/IQPrep-Deploy/frontend/pages/oauth-callback.html}