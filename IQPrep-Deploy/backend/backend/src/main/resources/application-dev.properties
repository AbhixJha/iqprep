# Local dev profile — activated by VS Code launch: -Dspring.profiles.active=dev
# Secrets from launch.json env or OS environment variables
logging.level.backend=INFO
logging.level.org.springframework.web=INFO

# OAuth credentials from environment (set in launch.json or OS env)
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://127.0.0.1:3000/IQPrep-Deploy/frontend/pages/oauth-callback.html}

github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
github.redirect.uri=${GITHUB_REDIRECT_URI:http://127.0.0.1:3000/IQPrep-Deploy/frontend/pages/oauth-callback.html}
