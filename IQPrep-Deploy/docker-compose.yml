services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_DATABASE: iqprep_db
    ports:
      - "3306:3306"
    volumes:
      - iqprep_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DB_URL: jdbc:mysql://db:3306/iqprep_db
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  iqprep_mysql:
